<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Read for Sleep</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #2a3444;
      --accent: #7c8cf8;
      --accent-h: #9ba8ff;
      --text: #cdd1e0;
      --muted: #6e7b94;
      --danger: #f87171;
      --success: #6ee7b7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 0 7rem;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem 0.75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .top-bar h1 { font-size: 1.25rem; font-weight: 700; color: #fff; }
    .top-bar p  { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }

    .server-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .server-badge.online  { background: rgba(110,231,183,0.15); color: var(--success); }
    .server-badge.offline { background: rgba(110,131,183,0.1);  color: var(--muted); }

    /* Now playing */
    .now-playing {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.25rem;
      z-index: 20;
      flex-direction: column;
      gap: 0.5rem;
    }
    .now-playing.visible { display: flex; }
    .np-title { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-meta  { font-size: 0.72rem; color: var(--muted); }
    audio { width: 100%; border-radius: 6px; height: 36px; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 65px;
      z-index: 9;
    }
    .tab {
      flex: 1; padding: 0.7rem 0; text-align: center;
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.hidden { display: none; }

    .section { display: none; padding: 1rem 1.25rem; }
    .section.active { display: block; }

    .section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.85rem;
    }

    /* Library */
    .lib-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 0; border-bottom: 1px solid var(--border);
    }
    .lib-item:last-child { border-bottom: none; }

    .lib-play {
      flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: #fff; transition: background 0.15s, transform 0.1s;
    }
    .lib-play:active { transform: scale(0.93); }
    .lib-play.playing { background: var(--success); }

    .lib-info { flex: 1; min-width: 0; }
    .lib-title { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lib-meta  { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    .lib-del {
      flex-shrink: 0; padding: 0.3rem 0.55rem; border-radius: 6px;
      border: 1px solid var(--danger); background: transparent;
      color: var(--danger); font-size: 0.8rem; cursor: pointer;
      transition: background 0.15s;
    }
    .lib-del:hover { background: rgba(248,113,113,0.1); }

    .empty { font-size: 0.88rem; color: var(--muted); text-align: center; padding: 2rem 0; }

    /* Ambient */
    .mixer-master {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem;
    }
    .mixer-master span { font-size: 0.9rem; font-weight: 600; color: #fff; }

    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background 0.2s; }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    .sound-rows { display: flex; flex-direction: column; gap: 0.85rem; }
    .sound-row { display: flex; align-items: center; gap: 0.85rem; opacity: 0.4; transition: opacity 0.2s; }
    .sound-row.active { opacity: 1; }
    .sound-icon { font-size: 1.3rem; width: 1.6rem; text-align: center; flex-shrink: 0; }
    .sound-name { font-size: 0.85rem; color: var(--text); min-width: 80px; flex-shrink: 0; }
    .sound-vol { flex: 1; accent-color: var(--accent); cursor: pointer; }
    .sound-vol:disabled { cursor: default; }
    .sound-vol-val { font-size: 0.75rem; color: var(--muted); min-width: 2.8rem; text-align: right; }

    /* Generate (local-only) */
    .gen-textarea {
      width: 100%; height: 200px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 0.9rem; line-height: 1.6;
      padding: 0.85rem; resize: vertical; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    .gen-textarea:focus { border-color: var(--accent); }
    .gen-textarea::placeholder { color: var(--muted); }

    .gen-row { display: flex; gap: 0.75rem; margin-top: 0.85rem; flex-wrap: wrap; }

    .gen-select {
      flex: 1; min-width: 120px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.85rem; padding: 0.5rem 0.65rem;
      outline: none; cursor: pointer;
    }

    .speed-group { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 120px; }
    .speed-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .speed-val   { font-size: 0.82rem; color: var(--accent); min-width: 2.5rem; text-align: right; }
    input[type="range"] { flex: 1; accent-color: var(--accent); }

    .gen-btn {
      width: 100%; margin-top: 1rem; padding: 0.85rem;
      border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; background: var(--accent); color: #fff; transition: background 0.2s;
    }
    .gen-btn:active { background: var(--accent-h); }
    .gen-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .progress-wrap { display: none; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .progress-wrap.visible { display: flex; }
    .progress-bar-bg { background: var(--bg); border-radius: 99px; height: 5px; overflow: hidden; border: 1px solid var(--border); }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; width: 0%; }
    .progress-label { font-size: 0.78rem; color: var(--muted); display: flex; justify-content: space-between; }

    .gen-error {
      display: none; color: var(--danger); font-size: 0.82rem; margin-top: 0.75rem;
      padding: 0.6rem 0.85rem; background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25); border-radius: 8px;
    }
    .gen-error.visible { display: block; }
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>🌙 Read for Sleep</h1>
    <p id="topSub">Your sleep audio library</p>
  </div>
  <span class="server-badge offline" id="serverBadge">● offline</span>
</div>

<div class="tabs">
  <div class="tab active" id="tab-btn-library"  onclick="switchTab('library', this)">Library</div>
  <div class="tab"        id="tab-btn-ambient"  onclick="switchTab('ambient', this)">Ambient</div>
  <div class="tab hidden" id="tab-btn-generate" onclick="switchTab('generate', this)">Generate</div>
</div>

<!-- Library -->
<div class="section active" id="tab-library">
  <p class="section-title">Recordings</p>
  <div id="libraryList"><p class="empty">Loading…</p></div>
</div>

<!-- Ambient -->
<div class="section" id="tab-ambient">
  <div class="mixer-master">
    <span>Ambient sounds</span>
    <label class="toggle">
      <input type="checkbox" id="mixerEnabled" onchange="onMixerToggle()" />
      <span class="toggle-track"></span>
      <span class="toggle-thumb"></span>
    </label>
  </div>
  <div class="sound-rows" id="soundRows"><p class="empty">Loading…</p></div>
</div>

<!-- Generate (shown only when local server is reachable) -->
<div class="section" id="tab-generate">
  <p class="section-title">New recording</p>
  <textarea class="gen-textarea" id="genText" placeholder="Paste any text to read aloud…"></textarea>
  <div class="gen-row">
    <select class="gen-select" id="genVoice"></select>
    <div class="speed-group">
      <span class="speed-label">Speed</span>
      <input type="range" id="genSpeed" min="0.5" max="1.2" step="0.05" value="0.8"
        oninput="document.getElementById('genSpeedVal').textContent = parseFloat(this.value).toFixed(2) + '×'" />
      <span class="speed-val" id="genSpeedVal">0.80×</span>
    </div>
  </div>
  <button class="gen-btn" id="genBtn" onclick="startGeneration()">✨ Generate Sleep Audio</button>
  <div class="progress-wrap" id="genProgress">
    <div class="progress-label">
      <span id="genStatusText">Generating…</span>
      <span id="genPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="genBar"></div></div>
  </div>
  <div class="gen-error" id="genError"></div>
</div>

<!-- Now playing -->
<div class="now-playing" id="nowPlaying">
  <div>
    <div class="np-title" id="npTitle">—</div>
    <div class="np-meta"  id="npMeta"></div>
  </div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
  // ── Mode detection ────────────────────────────────────────────────────────────
  // Local server URL — stored so user can override if needed via ?server=
  const params     = new URLSearchParams(location.search);
  const SERVER     = (params.get("server") || localStorage.getItem("rfs_server") || "").replace(/\/$/, "");
  let   serverOnline = false;

  async function detectServer() {
    const candidates = SERVER
      ? [SERVER]
      : ["http://localhost:5050", "http://127.0.0.1:5050"];

    for (const url of candidates) {
      try {
        const r = await fetch(`${url}/api/voices`, { signal: AbortSignal.timeout(1500) });
        if (r.ok) {
          serverOnline = true;
          if (SERVER !== url) localStorage.setItem("rfs_server", url);
          return url;
        }
      } catch {}
    }
    return null;
  }

  // Base URLs resolved after detection
  let apiBase  = "";   // local server  e.g. http://localhost:5050
  let staticBase = ""; // GitHub Pages root or same origin

  // On GitHub Pages the page lives at /read-4-sleep/static/mobile.html
  // Sounds and generated_audio are at /read-4-sleep/sounds/ and /read-4-sleep/generated_audio/
  // When running locally they're served by Flask at /sounds/ and /generated_audio/
  function resolveStaticBase() {
    // Walk up from /…/static/mobile.html → /…/
    const path = location.pathname.replace(/\/static\/mobile\.html$/, "");
    return location.origin + path;
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(name, el) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    el.classList.add("active");
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function formatDuration(secs) {
    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function soundMeta(name) {
    const l = name.toLowerCase();
    if (l.startsWith("fire"))  return { label: name.replace(/(\d+)$/," $1").trim(), icon: "🔥" };
    if (l.startsWith("rain"))  return { label: name.replace(/(\d+)$/," $1").trim(), icon: "🌧️" };
    if (l.startsWith("wind"))  return { label: name.replace(/(\d+)$/," $1").trim(), icon: "💨" };
    if (l.startsWith("ocean")) return { label: name.replace(/(\d+)$/," $1").trim(), icon: "🌊" };
    if (l.startsWith("night")) return { label: name.replace(/(\d+)$/," $1").trim(), icon: "🌌" };
    if (l.startsWith("bell"))  return { label: name.replace(/(\d+)$/," $1").trim(), icon: "🔔" };
    if (l.startsWith("sine"))  return { label: name.replace(/(\d+)$/," $1").trim(), icon: "〰️" };
    return { label: name, icon: "🎵" };
  }

  // ── Now playing ───────────────────────────────────────────────────────────────
  const audioPlayer = document.getElementById("audioPlayer");
  const nowPlaying  = document.getElementById("nowPlaying");
  let activeBtn = null;

  function playTrack(url, title, metaStr, btn) {
    if (activeBtn) { activeBtn.textContent = "▶"; activeBtn.classList.remove("playing"); }
    audioPlayer.src = url;
    audioPlayer.play().catch(() => {});
    document.getElementById("npTitle").textContent = title;
    document.getElementById("npMeta").textContent  = metaStr;
    nowPlaying.classList.add("visible");
    activeBtn = btn;
    btn.textContent = "■";
    btn.classList.add("playing");
    audioPlayer.onended = () => { btn.textContent = "▶"; btn.classList.remove("playing"); };
  }

  // ── Library ───────────────────────────────────────────────────────────────────
  async function loadLibrary() {
    const el = document.getElementById("libraryList");
    el.innerHTML = '<p class="empty">Loading…</p>';

    let items;
    try {
      // Always read the manifest — works both locally (Flask serves it) and on GitHub Pages
      const r = await fetch(`${staticBase}/generated_audio/library.json?t=${Date.now()}`);
      items = await r.json();
    } catch {
      el.innerHTML = '<p class="empty">Could not load library.</p>';
      return;
    }

    if (!items.length) { el.innerHTML = '<p class="empty">No recordings yet.</p>'; return; }

    el.innerHTML = "";
    items.forEach(item => {
      const audioUrl = `${staticBase}/generated_audio/${item.filename}`;
      const date = new Date(item.created_at * 1000).toLocaleDateString(undefined, {
        month: "short", day: "numeric", year: "numeric",
      });
      const metaStr = `${formatDuration(item.duration)} · ${escHtml(item.voice)} · ${date}`;

      const row = document.createElement("div");
      row.className = "lib-item";
      row.innerHTML = `
        <button class="lib-play" title="Play">▶</button>
        <div class="lib-info">
          <div class="lib-title">${escHtml(item.title)}</div>
          <div class="lib-meta">${metaStr}</div>
        </div>
        ${serverOnline ? `<button class="lib-del" title="Delete" data-filename="${escHtml(item.filename)}">🗑</button>` : ""}
      `;
      row.querySelector(".lib-play").addEventListener("click", function() {
        playTrack(audioUrl, item.title, metaStr, this);
      });
      if (serverOnline) {
        row.querySelector(".lib-del").addEventListener("click", function() {
          deleteItem(item.filename, this);
        });
      }
      el.appendChild(row);
    });
  }

  function deleteItem(filename, btn) {
    if (!confirm("Delete this recording?")) return;
    btn.disabled = true;
    fetch(`${apiBase}/api/audio/${filename}`, { method: "DELETE" })
      .then(r => r.json())
      .then(d => { if (d.error) { alert(d.error); btn.disabled = false; } else loadLibrary(); })
      .catch(() => { btn.disabled = false; alert("Delete failed."); });
  }

  // ── Ambient mixer ──────────────────────────────────────────────────────────────
  // Uses native HTMLAudioElement volume (not Web Audio API) so audio keeps playing
  // when the screen locks on iOS/Android.
  const ambientTracks = {};

  async function loadSounds() {
    const container = document.getElementById("soundRows");
    let sounds;
    try {
      const url = serverOnline ? `${apiBase}/api/sounds` : `${staticBase}/api/sounds`;
      // Fallback: build list from known sounds folder
      if (serverOnline) {
        const r = await fetch(`${apiBase}/api/sounds`);
        sounds = await r.json();
      } else {
        // On GitHub Pages we can't list a directory, so fetch a known sounds manifest or
        // hardcode the list based on what's in the repo
        const r = await fetch(`${staticBase}/sounds/index.json`).catch(() => null);
        if (r && r.ok) {
          sounds = await r.json();
        } else {
          container.innerHTML = '<p class="empty">Connect to the local server to load ambient sounds.</p>';
          return;
        }
      }
    } catch {
      container.innerHTML = '<p class="empty">Could not load sounds.</p>';
      return;
    }

    if (!sounds.length) { container.innerHTML = '<p class="empty">No sounds found.</p>'; return; }

    container.innerHTML = "";
    sounds.forEach(s => {
      const { label, icon } = soundMeta(s.name);
      const row = document.createElement("div");
      row.className = "sound-row";
      row.id = `srow-${s.filename}`;
      row.innerHTML = `
        <span class="sound-icon">${icon}</span>
        <span class="sound-name">${escHtml(label)}</span>
        <input type="range" class="sound-vol" min="0" max="1" step="0.01" value="0.3" disabled />
        <span class="sound-vol-val" id="vol-${s.filename}">30%</span>
      `;
      row.querySelector(".sound-vol").addEventListener("input", e => onVolumeChange(s.filename, e.target.value));
      container.appendChild(row);

      const soundUrl = serverOnline
        ? `${apiBase}/sounds/${s.filename}`
        : `${staticBase}/sounds/${s.filename}`;
      const audio = new Audio(soundUrl);
      audio.loop = true;
      audio.preload = "none";
      audio.volume = 0.3;
      ambientTracks[s.filename] = { audio };
    });
  }

  function onMixerToggle() {
    const enabled = document.getElementById("mixerEnabled").checked;
    Object.entries(ambientTracks).forEach(([filename, track]) => {
      const row    = document.getElementById(`srow-${filename}`);
      const slider = row?.querySelector(".sound-vol");
      if (enabled) {
        if (slider) track.audio.volume = parseFloat(slider.value);
        track.audio.play().catch(() => {});
        row?.classList.add("active");
        if (slider) slider.disabled = false;
      } else {
        track.audio.pause();
        row?.classList.remove("active");
        if (slider) slider.disabled = true;
      }
    });
  }

  function onVolumeChange(filename, value) {
    const track = ambientTracks[filename];
    if (track) track.audio.volume = parseFloat(value);
    const label = document.getElementById(`vol-${filename}`);
    if (label) label.textContent = Math.round(value * 100) + "%";
  }

  // ── Generate (local-server only) ──────────────────────────────────────────────
  async function loadVoices() {
    const r = await fetch(`${apiBase}/api/voices`);
    const voices = await r.json();
    const sel = document.getElementById("genVoice");
    const groups = {};
    voices.forEach(v => { (groups[v.lang] = groups[v.lang] || []).push(v); });
    Object.entries(groups).forEach(([lang, list]) => {
      const og = document.createElement("optgroup");
      og.label = lang;
      list.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = v.name + (v.recommended ? " ⭐" : "");
        if (v.recommended) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  let pollTimer = null;

  function startGeneration() {
    const text = document.getElementById("genText").value.trim();
    const errorEl = document.getElementById("genError");
    errorEl.classList.remove("visible");
    if (!text) { errorEl.textContent = "Paste some text first."; errorEl.classList.add("visible"); return; }

    const btn = document.getElementById("genBtn");
    btn.disabled = true;
    const progressWrap = document.getElementById("genProgress");
    progressWrap.classList.add("visible");
    setProgress(0, "Sending…");

    fetch(`${apiBase}/api/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text,
        voice: document.getElementById("genVoice").value,
        speed: parseFloat(document.getElementById("genSpeed").value),
      }),
    })
      .then(r => r.json())
      .then(d => { if (d.error) { genError(d.error, btn); return; } pollStatus(d.job_id, btn); })
      .catch(e => genError(e.message, btn));
  }

  function pollStatus(jobId, btn) {
    pollTimer = setInterval(() => {
      fetch(`${apiBase}/api/status/${jobId}`)
        .then(r => r.json())
        .then(job => {
          if (job.status === "processing") {
            const pct = Math.max(2, job.progress);
            setProgress(pct, pct < 10 ? "Loading model…" : `Synthesizing… (${pct}%)`);
          }
          if (job.status === "done") {
            clearInterval(pollTimer);
            setProgress(100, "Done!");
            btn.disabled = false;
            loadLibrary();
            document.getElementById("genText").value = "";
            setTimeout(() => {
              document.getElementById("genProgress").classList.remove("visible");
              switchTab("library", document.getElementById("tab-btn-library"));
            }, 1200);
          }
          if (job.status === "error") {
            clearInterval(pollTimer);
            genError(job.error || "Unknown error", btn);
          }
        })
        .catch(e => { clearInterval(pollTimer); genError(e.message, btn); });
    }, 1500);
  }

  function setProgress(pct, label) {
    document.getElementById("genBar").style.width = pct + "%";
    document.getElementById("genPct").textContent  = pct + "%";
    document.getElementById("genStatusText").textContent = label;
  }

  function genError(msg, btn) {
    document.getElementById("genProgress").classList.remove("visible");
    const errorEl = document.getElementById("genError");
    errorEl.textContent = "Error: " + msg;
    errorEl.classList.add("visible");
    if (btn) btn.disabled = false;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  async function init() {
    staticBase = resolveStaticBase();
    const foundServer = await detectServer();

    if (foundServer) {
      apiBase = foundServer;
      serverOnline = true;
      document.getElementById("serverBadge").textContent = "● local";
      document.getElementById("serverBadge").className   = "server-badge online";

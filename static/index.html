<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read for Sleep</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #2a3444;
      --accent: #7c8cf8;
      --accent-h: #9ba8ff;
      --text: #cdd1e0;
      --muted: #6e7b94;
      --danger: #f87171;
      --success: #6ee7b7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    [data-lucide] { display: inline-block; vertical-align: middle; }
    .moon [data-lucide] { width: 2.5rem; height: 2.5rem; color: var(--accent); }
    .sp-art [data-lucide] { width: 1.5rem; height: 1.5rem; color: var(--muted); }
    .sp-btn [data-lucide] { width: 22px; height: 22px; }
    .sp-btn.primary [data-lucide] { width: 20px; height: 20px; }
    .lib-play [data-lucide] { width: 16px; height: 16px; }
    .lib-del [data-lucide], .lib-dl [data-lucide] { width: 14px; height: 14px; }
    .btn [data-lucide] { width: 18px; height: 18px; }
    .mixer-header h2 [data-lucide] { width: 16px; height: 16px; }
    .library-card h2 [data-lucide] { width: 16px; height: 16px; }
    .download-btn [data-lucide] { width: 14px; height: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .moon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .card {
      width: 100%;
      max-width: 740px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.65;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    /* Stats row under textarea */
    .text-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .est-duration {
      font-weight: 600;
      color: var(--accent);
      transition: opacity 0.2s;
    }

    .est-duration.hidden {
      opacity: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: var(--accent);
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .speed-val {
      font-size: 0.85rem;
      color: var(--accent);
      min-width: 2.5rem;
      text-align: right;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 1.5rem;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-h);
    }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    /* Progress */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1.25rem;
    }

    .progress-wrap.visible {
      display: flex;
    }

    .progress-bar-bg {
      background: var(--bg);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s infinite;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Current player */
    .player-card { display: none; }
    .player-card.visible { display: block; }

    .player-card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .sp-player {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sp-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sp-art {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .sp-text { flex: 1; min-width: 0; }
    .sp-title { font-size: 0.95rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    .sp-scrubber-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sp-time { font-size: 0.72rem; color: var(--muted); min-width: 3rem; }
    .sp-time.right { text-align: right; }

    .sp-scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 99px;
      background: var(--border);
      accent-color: #fff;
      cursor: pointer;
    }
    .sp-scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    .sp-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
    }

    .sp-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      gap: 0.2rem;
      padding: 0; transition: color 0.15s, transform 0.1s;
    }
    .sp-btn:hover { color: #fff; }
    .sp-btn:active { transform: scale(0.92); }
    .sp-btn.primary {
      width: 48px; height: 48px;
      background: #fff; border-radius: 50%; color: #000;
    }
    .sp-btn.primary:hover { background: #e0e0e0; color: #000; }
    .skip-label { font-size: 0.65rem; font-weight: 700; line-height: 1; }

    .sp-footer {
      display: flex;
      justify-content: flex-end;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .download-btn:hover { background: rgba(124,140,248,0.12); }

    /* Error */
    .error-msg {
      display: none;
      color: var(--danger);
      font-size: 0.88rem;
      margin-top: 0.75rem;
      padding: 0.65rem 0.9rem;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px;
    }

    .error-msg.visible {
      display: block;
    }

    .tip {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.5rem;
    }

    /* Library */
    .library-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1rem;
    }

    .library-empty {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      padding: 1rem 0;
    }

    .lib-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .lib-item:last-child {
      border-bottom: none;
    }

    .lib-play {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: background 0.15s, transform 0.1s;
      color: #fff;
    }

    .lib-play:hover {
      background: var(--accent-h);
    }

    .lib-play:active {
      transform: scale(0.93);
    }

    .lib-info {
      flex: 1;
      min-width: 0;
    }

    .lib-title {
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }
    .lib-title:hover { color: var(--accent); }
    .lib-title-input {
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      width: 100%;
      outline: none;
    }

    .lib-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .lib-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .lib-dl,
    .lib-del {
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .lib-dl {
      color: var(--accent);
      border-color: var(--accent);
    }

    .lib-dl:hover {
      background: rgba(124, 140, 248, 0.1);
    }

    .lib-mp3 {
      color: var(--success);
      border-color: var(--success);
    }

    .lib-mp3:hover {
      background: rgba(110, 231, 183, 0.1);
    }

    .lib-mp3:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .lib-del {
      color: var(--danger);
      border-color: var(--danger);
    }

    .lib-del:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    /* Ambient mixer */
    .mixer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .mixer-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .mixer-toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .mixer-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .mixer-toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .mixer-toggle input:checked+.mixer-toggle-track {
      background: var(--accent);
    }

    .mixer-toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .mixer-toggle input:checked~.mixer-toggle-thumb {
      transform: translateX(18px);
    }

    .sound-rows {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .sound-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.45rem 0.85rem;
      align-items: start;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .sound-row.active {
      opacity: 1;
    }

    .sound-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      width: 1.5rem;
      text-align: center;
      grid-row: 1 / span 2;
      margin-top: 0.15rem;
    }

    .sound-name {
      font-size: 0.85rem;
      color: var(--text);
      min-width: 0;
    }

    .sound-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem 0.85rem;
    }

    .sound-control {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }

    .sound-control-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sound-vol,
    .sound-pitch {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
      height: 4px;
      width: 100%;
    }

    .sound-vol:disabled,
    .sound-pitch:disabled {
      cursor: default;
    }

    .sound-vol-val,
    .sound-pitch-val {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 2.8rem;
      text-align: right;
    }

    @media (max-width: 520px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .lib-actions {
        flex-direction: column;
      }

      .sound-controls {
        grid-template-columns: 1fr;
      }
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.visible { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.5rem 1.25rem;
      max-width: 380px;
      width: calc(100% - 2rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-msg {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.65rem;
    }
    .modal-btn {
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.cancel { background: var(--border); color: var(--text); }
    .modal-btn.confirm { background: var(--danger); color: #fff; }
    .modal-btn.ok { background: var(--accent); color: #fff; }
  </style>
</head>

<body>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <header>
    <span class="moon"><i data-lucide="moon"></i></span>
    <h1>Read for Sleep</h1>
    <p>Paste any text — get a calm audio to drift off to</p>
  </header>

  <!-- Input card -->
  <div class="card">
    <label for="textInput">Your text</label>
    <textarea id="textInput"
      placeholder="Paste your article, story, meditation script, or anything you want read to you while falling asleep..."></textarea>
    <div class="text-stats">
      <span><span id="wordCount">0</span> words · <span id="charCount">0</span> / 200,000 chars</span>
      <span class="est-duration hidden" id="estDuration"></span>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect"></select>
      </div>
      <div class="control-group">
        <label>Speed <small style="text-transform:none;font-size:0.75rem;color:var(--muted)">(slower = more
            relaxing)</small></label>
        <div class="speed-row">
          <input type="range" id="speedRange" min="0.5" max="1.2" step="0.05" value="0.8" />
          <span class="speed-val" id="speedVal">0.8×</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="startGeneration()">
      <i data-lucide="sparkles"></i> Generate Sleep Audio
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">Generating audio…</span></span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Current player -->
  <div class="card player-card" id="playerCard">
    <h2>Now playing</h2>
    <audio id="audioPlayer"></audio>

    <div class="sp-player">
      <div class="sp-info">
        <div class="sp-art"><i data-lucide="moon"></i></div>
        <div class="sp-text">
          <div class="sp-title" id="spTitle">—</div>
          <div class="sp-meta"  id="spMeta"></div>
        </div>
      </div>

      <div class="sp-scrubber-row">
        <span class="sp-time" id="spCurrent">0:00</span>
        <input type="range" class="sp-scrubber" id="spScrubber" min="0" value="0" step="1" />
        <span class="sp-time right" id="spDuration">0:00</span>
      </div>

      <div class="sp-controls">
        <button class="sp-btn" onclick="seekRel(-15)" title="−15s">
          <i data-lucide="rotate-ccw"></i>
          <span class="skip-label">15</span>
        </button>
        <button class="sp-btn primary" id="spPlayPause" onclick="togglePlay()">
          <i data-lucide="play" id="spPlayIcon"></i>
        </button>
        <button class="sp-btn" onclick="seekRel(15)" title="+15s">
          <i data-lucide="rotate-cw"></i>
          <span class="skip-label">15</span>
        </button>
      </div>

      <div class="sp-footer">
        <a class="download-btn" id="downloadLink" download><i data-lucide="download"></i> Download</a>
      </div>
    </div>
  </div>



  <!-- Ambient mixer -->
  <div class="card" id="mixerCard">
    <div class="mixer-header">
      <h2><i data-lucide="wind"></i> Ambient sounds</h2>
      <label class="mixer-toggle" title="Enable ambient sounds">
        <input type="checkbox" id="mixerEnabled" onchange="onMixerToggle()" />
        <span class="mixer-toggle-track"></span>
        <span class="mixer-toggle-thumb"></span>
      </label>
    </div>
    <div class="sound-rows" id="soundRows">
      <p class="library-empty">Loading sounds…</p>
    </div>
  </div>

  <!-- Library -->
  <div class="card library-card" id="libraryCard">
    <h2><i data-lucide="library"></i> Previous recordings</h2>
    <div id="libraryList">
      <p class="library-empty">No recordings yet.</p>
    </div>
  </div>

  <script>
    // ── Modal helpers ─────────────────────────────────────────────────────────────
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalMsg      = document.getElementById("modalMsg");
    const modalActions  = document.getElementById("modalActions");

    function showAlert(msg) {
      return new Promise(resolve => {
        modalMsg.textContent = msg;
        modalActions.innerHTML = "";
        const ok = document.createElement("button");
        ok.className = "modal-btn ok";
        ok.textContent = "OK";
        ok.onclick = () => { modalBackdrop.classList.remove("visible"); resolve(); };
        modalActions.appendChild(ok);
        modalBackdrop.classList.add("visible");
        ok.focus();
      });
    }

    function showConfirm(msg) {
      return new Promise(resolve => {
        modalMsg.textContent = msg;
        modalActions.innerHTML = "";
        const cancel = document.createElement("button");
        cancel.className = "modal-btn cancel";
        cancel.textContent = "Cancel";
        cancel.onclick = () => { modalBackdrop.classList.remove("visible"); resolve(false); };
        const confirm = document.createElement("button");
        confirm.className = "modal-btn confirm";
        confirm.textContent = "Delete";
        confirm.onclick = () => { modalBackdrop.classList.remove("visible"); resolve(true); };
        modalActions.append(cancel, confirm);
        modalBackdrop.classList.add("visible");
        confirm.focus();
      });
    }

    modalBackdrop.addEventListener("click", e => {
      if (e.target === modalBackdrop) modalBackdrop.classList.remove("visible");
    });

    const textInput = document.getElementById("textInput");
    const wordCount = document.getElementById("wordCount");
    const charCount = document.getElementById("charCount");
    const estDuration = document.getElementById("estDuration");
    const voiceSelect = document.getElementById("voiceSelect");
    const speedRange = document.getElementById("speedRange");
    const speedVal = document.getElementById("speedVal");
    const generateBtn = document.getElementById("generateBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressPct = document.getElementById("progressPct");
    const statusText = document.getElementById("statusText");
    const statusDot = document.getElementById("statusDot");
    const errorMsg = document.getElementById("errorMsg");
    const playerCard  = document.getElementById("playerCard");
    const audioPlayer = document.getElementById("audioPlayer");
    const downloadLink = document.getElementById("downloadLink");
    const libraryList  = document.getElementById("libraryList");
    const spScrubber   = document.getElementById("spScrubber");
    const spPlayIcon   = document.getElementById("spPlayIcon");

    let pollTimer = null;
    let spSeeking = false;

    function setIcon(el, name) {
      el.setAttribute("data-lucide", name);
      lucide.createIcons({ nodes: [el] });
    }

    function fmtTime(s) {
      if (!isFinite(s)) return "0:00";
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    }

    audioPlayer.addEventListener("timeupdate", () => {
      if (spSeeking) return;
      spScrubber.value = audioPlayer.currentTime;
      document.getElementById("spCurrent").textContent = fmtTime(audioPlayer.currentTime);
    });
    audioPlayer.addEventListener("loadedmetadata", () => {
      spScrubber.max = Math.floor(audioPlayer.duration);
      document.getElementById("spDuration").textContent = fmtTime(audioPlayer.duration);
    });
    audioPlayer.addEventListener("play",  () => setIcon(spPlayIcon, "pause"));
    audioPlayer.addEventListener("pause", () => setIcon(spPlayIcon, "play"));
    audioPlayer.addEventListener("ended", () => {
      setIcon(spPlayIcon, "play");
      document.querySelectorAll(".lib-play i").forEach(i => setIcon(i, "play"));
    });

    spScrubber.addEventListener("mousedown",  () => spSeeking = true);
    spScrubber.addEventListener("input",  () => document.getElementById("spCurrent").textContent = fmtTime(+spScrubber.value));
    spScrubber.addEventListener("change", () => { audioPlayer.currentTime = +spScrubber.value; spSeeking = false; });

    function togglePlay() {
      if (audioPlayer.paused) audioPlayer.play().catch(() => {});
      else audioPlayer.pause();
    }
    function seekRel(secs) {
      audioPlayer.currentTime = Math.max(0, Math.min(audioPlayer.duration || 0, audioPlayer.currentTime + secs));
    }

    // ── Text stats ──────────────────────────────────────────────────────────────

    // Average spoken words per minute at speed 1.0 (natural reading pace ~150 wpm)
    const BASE_WPM = 150;

    function updateStats() {
      const text = textInput.value;
      const chars = text.length;
      const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
      const speed = parseFloat(speedRange.value);

      charCount.textContent = chars.toLocaleString();
      wordCount.textContent = words.toLocaleString();

      if (words > 0) {
        const mins = words / (BASE_WPM * speed);
        estDuration.textContent = "≈ " + formatDuration(Math.round(mins * 60));
        estDuration.classList.remove("hidden");
      } else {
        estDuration.classList.add("hidden");
      }
    }

    textInput.addEventListener("input", updateStats);
    speedRange.addEventListener("input", () => {
      speedVal.textContent = parseFloat(speedRange.value).toFixed(2) + "×";
      updateStats();
    });

    // ── Voices ──────────────────────────────────────────────────────────────────

    fetch("/api/voices")
      .then(r => r.json())
      .then(voices => {
        const groups = {};
        voices.forEach(v => {
          if (!groups[v.lang]) groups[v.lang] = [];
          groups[v.lang].push(v);
        });
        Object.entries(groups).forEach(([lang, list]) => {
          const og = document.createElement("optgroup");
          og.label = lang;
          list.forEach(v => {
            const opt = document.createElement("option");
            opt.value = v.id;
            opt.textContent = v.name + (v.recommended ? " ⭐" : "");
            if (v.recommended) opt.selected = true;
            og.appendChild(opt);
          });
          voiceSelect.appendChild(og);
        });
      });

    // ── Helpers ─────────────────────────────────────────────────────────────────

    function formatDuration(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }
    function clearError() {
      errorMsg.classList.remove("visible");
      errorMsg.textContent = "";
    }
    function setProgress(pct, label) {
      progressBar.style.width = pct + "%";
      progressPct.textContent = pct + "%";
      if (label) statusText.textContent = label;
    }

    // ── Generation ──────────────────────────────────────────────────────────────

    function startGeneration() {
      const text = textInput.value.trim();
      if (!text) { showError("Please paste some text first."); return; }
      if (text.length > 200000) { showError("Text is too long (max 200,000 chars)."); return; }

      clearError();
      generateBtn.disabled = true;
      progressWrap.classList.add("visible");
      playerCard.classList.remove("visible");
      statusDot.style.animation = "";
      statusDot.style.background = "";
      setProgress(0, "Sending text…");

      fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text,
          voice: voiceSelect.value,
          speed: parseFloat(speedRange.value),
        }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) { handleError(data.error); return; }
          setProgress(2, "Model loading…");
          pollStatus(data.job_id);
        })
        .catch(e => handleError(e.message));
    }

    function pollStatus(jobId) {
      pollTimer = setInterval(() => {
        fetch(`/api/status/${jobId}`)
          .then(r => r.json())
          .then(job => {
            if (job.error) { handleError(job.error); return; }

            if (job.status === "processing") {
              const pct = Math.max(2, job.progress);
              const label = pct < 10 ? "Loading Kokoro model…"
                : pct < 95 ? `Synthesizing audio… (${pct}%)`
                  : "Finalizing…";
              setProgress(pct, label);
            }

            if (job.status === "done") {
              clearInterval(pollTimer);
              setProgress(100, "Done!");
              statusDot.style.animation = "none";
              statusDot.style.background = "var(--success)";

              const audioUrl = `/api/audio/${job.filename}`;
              loadPlayer(audioUrl, "Your new recording", job.filename);
              playerCard.classList.add("visible");
              generateBtn.disabled = false;
              audioPlayer.play().catch(() => { });
              loadLibrary();
            }

            if (job.status === "error") {
              clearInterval(pollTimer);
              handleError(job.error || "Unknown error during generation.");
            }
          })
          .catch(e => { clearInterval(pollTimer); handleError(e.message); });
      }, 1500);
    }

    function handleError(msg) {
      clearInterval(pollTimer);
      progressWrap.classList.remove("visible");
      generateBtn.disabled = false;
      showError("Error: " + msg);
    }

    // ── Library ─────────────────────────────────────────────────────────────────

    function loadLibrary() {
      fetch("/api/library")
        .then(r => r.json())
        .then(items => {
          if (!items.length) {
            libraryList.innerHTML = '<p class="library-empty">No recordings yet.</p>';
            return;
          }

          libraryList.innerHTML = "";
          items.forEach(item => {
            const audioUrl = `/api/audio/${item.filename}`;
            const date = new Date(item.created_at * 1000).toLocaleDateString(undefined, {
              month: "short", day: "numeric", year: "numeric",
            });

            const isWav = item.filename.endsWith(".wav");
            const downloadName = isWav ? "sleep-audio.wav" : "sleep-audio.mp3";

            const row = document.createElement("div");
            row.className = "lib-item";
            row.dataset.filename = item.filename;
            row.innerHTML = `
            <button class="lib-play" title="Play" onclick="playLibItem('${audioUrl}', this)">
              <i data-lucide="play"></i>
            </button>
            <div class="lib-info">
              <div class="lib-title" title="Double-click to rename">${escHtml(item.title)}</div>
              <div class="lib-meta">${formatDuration(item.duration)} · ${escHtml(item.voice)} · ${date} · <strong>${isWav ? "WAV" : "MP3"}</strong></div>
            </div>
            <div class="lib-actions">
              ${isWav ? `<button class="lib-dl lib-mp3" title="Convert to MP3 320kbps" onclick="convertToMp3('${item.filename}', this)"><i data-lucide="file-audio"></i> MP3</button>` : ""}
              <a class="lib-dl" href="${audioUrl}" download="${downloadName}" title="Download"><i data-lucide="download"></i></a>
              <button class="lib-del" title="Delete" onclick="deleteItem('${item.filename}', this)"><i data-lucide="trash-2"></i></button>
            </div>
          `;
            row.querySelector(".lib-title").addEventListener("dblclick", function () {
              renameItem(item.filename, this);
            });
            libraryList.appendChild(row);
          });
          lucide.createIcons();
        });
    }

    function loadPlayer(url, title, filename) {
      audioPlayer.src = url;
      downloadLink.href = url;
      downloadLink.download = filename;
      document.getElementById("spTitle").textContent = title;
    }

    function playLibItem(url, btn) {
      document.querySelectorAll(".lib-play i").forEach(i => setIcon(i, "play"));
      const row   = btn.closest(".lib-item");
      const title = row?.querySelector(".lib-title")?.textContent || "Recording";
      const fname = row?.dataset.filename || "sleep-audio";
      loadPlayer(url, title, fname);
      playerCard.classList.add("visible");
      audioPlayer.play().catch(() => {});
      setIcon(btn.querySelector("i"), "square");
      audioPlayer.addEventListener("ended", () => { setIcon(btn.querySelector("i"), "play"); }, { once: true });
    }

    function convertToMp3(filename, btn) {
      btn.disabled = true;
      btn.innerHTML = "…";
      fetch(`/api/audio/${filename}/convert-mp3`, { method: "POST" })
        .then(r => r.json())
        .then(data => {
          if (data.error) { showAlert(data.error); btn.disabled = false; btn.textContent = "MP3"; return; }
          loadLibrary();
        })
        .catch(() => { btn.disabled = false; btn.textContent = "MP3"; showAlert("Conversion failed."); });
    }

    async function deleteItem(filename, btn) {
      const ok = await showConfirm("Delete this recording?");
      if (!ok) return;
      btn.disabled = true;
      fetch(`/api/audio/${filename}`, { method: "DELETE" })
        .then(r => r.json())
        .then(data => {
          if (data.error) { showAlert(data.error); btn.disabled = false; return; }
          const row = btn.closest(".lib-item");
          row.style.transition = "opacity 0.3s";
          row.style.opacity = "0";
          setTimeout(() => { row.remove(); checkEmpty(); }, 300);
        })
        .catch(() => { btn.disabled = false; showAlert("Delete failed."); });
    }

    function renameItem(filename, titleEl) {
      const current = titleEl.textContent;
      const input = document.createElement("input");
      input.className = "lib-title-input";
      input.value = current;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      function commit() {
        const newTitle = input.value.trim();
        if (!newTitle || newTitle === current) {
          input.replaceWith(titleEl);
          return;
        }
        fetch(`/api/audio/${filename}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitle }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.error) { showAlert(data.error); input.replaceWith(titleEl); return; }
            titleEl.textContent = data.title;
            input.replaceWith(titleEl);
            const row = titleEl.closest(".lib-item");
            if (row?.dataset.filename === filename) {
              document.getElementById("spTitle").textContent = data.title;
            }
          })
          .catch(() => { input.replaceWith(titleEl); showAlert("Rename failed."); });
      }

      input.addEventListener("blur", commit);
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") { input.blur(); }
        if (e.key === "Escape") { input.value = current; input.blur(); }
      });
    }

    function checkEmpty() {
      if (!libraryList.querySelector(".lib-item")) {
        libraryList.innerHTML = '<p class="library-empty">No recordings yet.</p>';
      }
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Load library on page open
    loadLibrary();
    lucide.createIcons();

    // ── Ambient mixer ────────────────────────────────────────────────────────────

    const ambientTracks = {};

    function formatPitchLabel(value) {
      const semitones = parseFloat(value);
      const display = Number.isInteger(semitones)
        ? String(semitones)
        : semitones.toFixed(1).replace(/\.0$/, "");
      return `${semitones > 0 ? "+" : ""}${display} st`;
    }

    function applyPitchToAudio(audio, semitones) {
      const rate = Math.pow(2, semitones / 12);
      audio.defaultPlaybackRate = rate;
      audio.playbackRate = rate;
    }

    function disablePitchPreservation(audio) {
      if ("preservesPitch" in audio) audio.preservesPitch = false;
      if ("webkitPreservesPitch" in audio) audio.webkitPreservesPitch = false;
      if ("mozPreservesPitch" in audio) audio.mozPreservesPitch = false;
    }

    // Friendly display names and icons derived from filename
    function soundMeta(name) {
      const lower = name.toLowerCase();
      if (lower.startsWith("fire")) return { label: name.replace(/(\d+)$/, " $1").trim(), icon: "🔥" };
      if (lower.startsWith("rain")) return { label: name.replace(/(\d+)$/, " $1").trim(), icon: "🌧️" };
      if (lower.startsWith("wind")) return { label: name.replace(/(\d+)$/, " $1").trim(), icon: "💨" };
      if (lower.startsWith("ocean")) return { label: name.replace(/(\d+)$/, " $1").trim(), icon: "🌊" };
      if (lower.startsWith("bird")) return { label: name.replace(/(\d+)$/, " $1").trim(), icon: "🐦" };
      return { label: name, icon: "🎵" };
    }

    function loadSounds() {
      fetch("/api/sounds")
        .then(r => r.json())
        .then(sounds => {
          const container = document.getElementById("soundRows");
          if (!sounds.length) {
            container.innerHTML = '<p class="library-empty">No sounds found in /sounds folder.</p>';
            return;
          }
          container.innerHTML = "";
          sounds.forEach(s => {
            const { label, icon } = soundMeta(s.name);
            const row = document.createElement("div");
            row.className = "sound-row";
            row.id = `srow-${s.filename}`;
            row.innerHTML = `
            <span class="sound-icon">${icon}</span>
            <span class="sound-name">${escHtml(label)}</span>
            <div class="sound-controls">
              <label class="sound-control">
                <span class="sound-control-label">Vol</span>
                <input type="range" class="sound-vol" min="0" max="1" step="0.01" value="0.1"
                  disabled
                  oninput="onVolumeChange('${s.filename}', this.value)"
                  title="Volume" />
                <span class="sound-vol-val" id="vol-${s.filename}">10%</span>
              </label>
              <label class="sound-control">
                <span class="sound-control-label">Pitch</span>
                <input type="range" class="sound-pitch" min="-6" max="6" step="0.5" value="0"
                  disabled
                  oninput="onPitchChange('${s.filename}', this.value)"
                  title="Pitch" />
                <span class="sound-pitch-val" id="pitch-${s.filename}">0 st</span>
              </label>
            </div>
          `;
            container.appendChild(row);

            const audio = new Audio(`/sounds/${s.filename}`);
            audio.loop = true;
            audio.preload = "none";
            audio.volume = 0.1;
            disablePitchPreservation(audio);
            applyPitchToAudio(audio, 0);
            ambientTracks[s.filename] = { audio, pitch: 0 };
          });
        });
    }

    function onMixerToggle() {
      const enabled = document.getElementById("mixerEnabled").checked;
      Object.entries(ambientTracks).forEach(([filename, track]) => {
        const row = document.getElementById(`srow-${filename}`);
        const volumeSlider = row ? row.querySelector(".sound-vol") : null;
        const pitchSlider = row ? row.querySelector(".sound-pitch") : null;
        if (enabled) {
          if (volumeSlider) track.audio.volume = parseFloat(volumeSlider.value);
          if (pitchSlider) applyPitchToAudio(track.audio, parseFloat(pitchSlider.value));
          track.audio.play().catch(() => {});
          if (row) row.classList.add("active");
          if (volumeSlider) volumeSlider.disabled = false;
          if (pitchSlider) pitchSlider.disabled = false;
        } else {
          track.audio.pause();
          if (row) row.classList.remove("active");
          if (volumeSlider) volumeSlider.disabled = true;
          if (pitchSlider) pitchSlider.disabled = true;
        }
      });
    }

    function onVolumeChange(filename, value) {
      const track = ambientTracks[filename];
      if (track) track.audio.volume = parseFloat(value);
      const label = document.getElementById(`vol-${filename}`);
      if (label) label.textContent = Math.round(value * 100) + "%";
    }

    function onPitchChange(filename, value) {
      const track = ambientTracks[filename];
      if (track) {
        const semitones = parseFloat(value);
        track.pitch = semitones;
        applyPitchToAudio(track.audio, semitones);
      }
      const label = document.getElementById(`pitch-${filename}`);
      if (label) label.textContent = formatPitchLabel(value);
    }

    loadSounds();
  </script>
</body>

</html>
